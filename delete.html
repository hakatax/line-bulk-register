<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カレンダー予定削除</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 480px; margin: 0 auto; padding: 16px; }
h1 { font-size: 18px; text-align: center; padding: 12px 0; color: #e55; }
.info-bar { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 14px; border-left: 4px solid #e55; }
.info-bar .label { color: #888; font-size: 12px; }
.info-bar .value { font-weight: bold; margin-top: 2px; }

/* カレンダー */
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cal-month { font-size: 16px; font-weight: bold; text-align: center; width: 100%; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 12px; }
.cal-day-label { text-align: center; font-size: 12px; color: #888; padding: 4px; }
.cal-day-label:first-child { color: #e55; }
.cal-day-label:last-child { color: #55e; }
.cal-day { text-align: center; padding: 10px 4px; border-radius: 8px; font-size: 14px; background: #fff; border: 1px solid #eee; transition: all 0.15s; -webkit-tap-highlight-color: transparent; position: relative; }
.cal-day.empty { background: transparent; border: none; cursor: default; }
.cal-day.today { border-color: #06c755; }
.cal-day.no-event { color: #ccc; cursor: default; background: #fafafa; }
.cal-day.has-event { background: #ffe0e0; color: #c00; cursor: pointer; font-weight: bold; border-color: #ffb3b3; }
.cal-day.has-event:hover { background: #ffcccc; }
.cal-day.selected { background: #e55; color: #fff; border-color: #e55; font-weight: bold; }
.cal-day .event-count { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #c00; font-weight: normal; }
.cal-day.selected .event-count { color: #fff; }
.selected-count { text-align: center; font-size: 14px; margin: 8px 0; color: #666; }
.selected-dates { font-size: 13px; color: #555; background: #fff; border-radius: 8px; padding: 12px; margin: 8px 0; max-height: 120px; overflow-y: auto; }
.submit-btn { width: 100%; padding: 16px; background: #e55; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; }
.submit-btn:disabled { background: #ccc; }
.close-btn { width: 100%; padding: 12px; background: #fff; color: #666; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }

/* 結果 */
.result { text-align: center; padding: 32px 16px; }
.result .icon { font-size: 48px; margin-bottom: 16px; }
.result .message { font-size: 16px; margin-bottom: 8px; }
.result .detail { font-size: 14px; color: #666; }
.loading { text-align: center; padding: 32px; }
.spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #e55; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { text-align: center; padding: 32px; color: #e55; }
</style>
</head>
<body>
<div class="container">
  <h1>カレンダー予定削除</h1>

  <div class="info-bar">
    <div class="label">削除対象の取引先</div>
    <div class="value" id="clientInfo">読み込み中...</div>
  </div>

  <div id="calendarArea">
    <div class="cal-header">
      <span id="calMonth" class="cal-month"></span>
    </div>
    <div id="calendar" class="cal-grid"></div>
    <div id="selectedCount" class="selected-count">0件選択中</div>
    <div id="selectedDates" class="selected-dates" style="display:none;"></div>
    <button id="submitBtn" class="submit-btn" disabled onclick="submitDelete()">削除する</button>
    <button class="close-btn" onclick="closePage()">閉じる</button>
  </div>

  <div id="resultArea" style="display:none;"></div>
</div>

<script>
// URLパラメータ取得(LIFF経由の場合はliff.stateから復元)
var rawSearch = window.location.search;
if (rawSearch.indexOf('liff.state') >= 0) {
  var liffState = new URLSearchParams(rawSearch).get('liff.state');
  if (liffState) {
    rawSearch = liffState;
  }
}
var urlParams = new URLSearchParams(rawSearch);
var shortName = urlParams.get('shortName') || '';
var userId = urlParams.get('userId') || '';
var gasUrl = urlParams.get('gasUrl') || '';
var apiKey = urlParams.get('key') || '';

// 状態管理
var selectedEventIds = [];
var currentYear, currentMonth;
var allEvents = [];

// 初期化
window.onload = function() {
  if (!shortName || !gasUrl) {
    document.getElementById('clientInfo').textContent = 'エラー：情報が足りません';
    document.getElementById('calendarArea').style.display = 'none';
    return;
  }
  document.getElementById('clientInfo').textContent = shortName;
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadEvents();
};

// カレンダー予定を取得
function loadEvents() {
  document.getElementById('calendar').innerHTML = '<div class="loading"><div class="spinner"></div><p>予定を読み込み中...</p></div>';

  var apiUrl = gasUrl + '?action=getCalendarEvents'
    + '&shortName=' + encodeURIComponent(shortName)
    + '&userId=' + encodeURIComponent(userId)
    + '&year=' + currentYear
    + '&month=' + (currentMonth + 1)
    + '&key=' + encodeURIComponent(apiKey);

  fetch(apiUrl)
    .then(function(response) { return response.json(); })
    .then(function(result) {
      if (result.success) {
        allEvents = result.events || [];
        renderCalendar();
      } else {
        document.getElementById('calendar').innerHTML = '<div class="error-msg">予定の取得に失敗しました：' + (result.message || '不明なエラー') + '</div>';
      }
    })
    .catch(function(err) {
      document.getElementById('calendar').innerHTML = '<div class="error-msg">通信エラー：' + err.message + '</div>';
    });
}

// カレンダー描画
function renderCalendar() {
  var grid = document.getElementById('calendar');
  grid.innerHTML = '';
  document.getElementById('calMonth').textContent = currentYear + '年' + (currentMonth + 1) + '月';

  var dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
  dayLabels.forEach(function(d) {
    var el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = new Date();

  // 日付ごとのイベント数をカウント
  var eventsByDate = {};
  allEvents.forEach(function(ev) {
    if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
    eventsByDate[ev.date].push(ev);
  });

  for (var i = 0; i < firstDay; i++) {
    var el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var el = document.createElement('div');
    var dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var dayEvents = eventsByDate[dateStr] || [];

    el.textContent = d;

    if (dayEvents.length > 0) {
      el.className = 'cal-day has-event';
      // 複数予定がある場合は件数表示
      if (dayEvents.length > 1) {
        var badge = document.createElement('span');
        badge.className = 'event-count';
        badge.textContent = dayEvents.length + '件';
        el.appendChild(badge);
      }
      // このセルのイベントIDがすべて選択されていたらselected表示
      var allSelected = dayEvents.every(function(ev) { return selectedEventIds.indexOf(ev.id) >= 0; });
      if (allSelected) {
        el.classList.add('selected');
      }
      (function(events, element) {
        element.onclick = function() { toggleDate(events, element); };
      })(dayEvents, el);
    } else {
      el.className = 'cal-day no-event';
    }

    if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d) {
      el.classList.add('today');
    }

    grid.appendChild(el);
  }
  updateSelectedDisplay();
}

// 日付の選択/解除(その日のすべての予定を対象)
function toggleDate(events, el) {
  // その日のすべてのイベントIDが選択済みかチェック
  var allSelected = events.every(function(ev) { return selectedEventIds.indexOf(ev.id) >= 0; });

  if (allSelected) {
    // 解除
    events.forEach(function(ev) {
      var idx = selectedEventIds.indexOf(ev.id);
      if (idx >= 0) selectedEventIds.splice(idx, 1);
    });
    el.classList.remove('selected');
  } else {
    // 複数予定の場合は警告
    if (events.length > 1) {
      if (!confirm('この日には' + events.length + '件の予定があります。\n全て削除対象に追加しますか?')) {
        return;
      }
    }
    // 追加(重複しないように)
    events.forEach(function(ev) {
      if (selectedEventIds.indexOf(ev.id) < 0) {
        selectedEventIds.push(ev.id);
      }
    });
    el.classList.add('selected');
  }
  updateSelectedDisplay();
}

// 選択状態の表示更新
function updateSelectedDisplay() {
  document.getElementById('selectedCount').textContent = selectedEventIds.length + '件選択中';
  document.getElementById('submitBtn').disabled = selectedEventIds.length === 0;

  var datesEl = document.getElementById('selectedDates');
  if (selectedEventIds.length > 0) {
    // 選択されたイベントの日付とタイトルを表示
    var selectedEvents = allEvents.filter(function(ev) { return selectedEventIds.indexOf(ev.id) >= 0; });
    selectedEvents.sort(function(a, b) { return a.date.localeCompare(b.date); });
    datesEl.style.display = 'block';
    datesEl.innerHTML = selectedEvents.map(function(ev) {
      var parts = ev.date.split('-');
      return parseInt(parts[1]) + '/' + parseInt(parts[2]) + ' ' + ev.title;
    }).join('<br>');
  } else {
    datesEl.style.display = 'none';
  }
}

// 削除実行
function submitDelete() {
  if (selectedEventIds.length === 0) return;
  if (!confirm(selectedEventIds.length + '件の予定を削除します。\nよろしいですか?')) return;

  document.getElementById('calendarArea').style.display = 'none';
  var resultArea = document.getElementById('resultArea');
  resultArea.style.display = 'block';
  resultArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>削除中...</p></div>';

  var apiUrl = gasUrl + '?action=deleteCalendarEvents'
    + '&eventIds=' + encodeURIComponent(selectedEventIds.join(','))
    + '&userId=' + encodeURIComponent(userId)
    + '&key=' + encodeURIComponent(apiKey);

  fetch(apiUrl)
    .then(function(response) { return response.json(); })
    .then(function(result) {
      if (result.success) {
        resultArea.innerHTML = '<div class="result">'
          + '<div class="icon">✅</div>'
          + '<div class="message">' + result.count + '件の予定を削除しました</div>'
          + '<div class="detail">' + shortName + '</div>'
          + '<br><button class="close-btn" onclick="closePage()">閉じる</button>'
          + '</div>';
      } else {
        resultArea.innerHTML = '<div class="result">'
          + '<div class="icon">❌</div>'
          + '<div class="message">エラーが発生しました</div>'
          + '<div class="detail">' + (result.message || '不明なエラー') + '</div>'
          + '<br><button class="close-btn" onclick="resetCalendar()">戻る</button>'
          + '</div>';
      }
    })
    .catch(function(err) {
      resultArea.innerHTML = '<div class="result">'
        + '<div class="icon">❌</div>'
        + '<div class="message">通信エラーが発生しました</div>'
        + '<div class="detail">' + err.message + '</div>'
        + '<br><button class="close-btn" onclick="resetCalendar()">戻る</button>'
        + '</div>';
    });
}

// カレンダーに戻る
function resetCalendar() {
  selectedEventIds = [];
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('calendarArea').style.display = 'block';
  loadEvents();
}

// ページを閉じる
function closePage() {
  window.close();
  setTimeout(function() {
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('calendarArea').style.display = 'none';
    document.getElementById('resultArea').innerHTML = '<div class="result">'
      + '<div class="icon">✅</div>'
      + '<div class="message">完了しました</div>'
      + '<div class="detail">この画面を閉じてLINEに戻ってください</div>'
      + '</div>';
  }, 500);
}
</script>
</body>
</html>
