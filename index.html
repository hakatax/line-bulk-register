<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>案件一括登録</title>

<!-- ★追加：LIFF SDK -->
<script charset="utf-8" src="https://static.line-sdn.net/liff/edge/2/sdk.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; }
.container { max-width: 480px; margin: 0 auto; padding: 16px; }
h1 { font-size: 18px; text-align: center; padding: 12px 0; color: #06c755; }
.info-bar { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 14px; border-left: 4px solid #06c755; }
.info-bar .label { color: #888; font-size: 12px; }
.info-bar .value { font-weight: bold; margin-top: 2px; }

/* カレンダー */
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cal-header button { background: #06c755; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
.cal-month { font-size: 16px; font-weight: bold; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 12px; }
.cal-day-label { text-align: center; font-size: 12px; color: #888; padding: 4px; }
.cal-day-label:first-child { color: #e55; }
.cal-day-label:last-child { color: #55e; }
.cal-day { text-align: center; padding: 10px 4px; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; border: 1px solid #eee; transition: all 0.15s; }
.cal-day.selected { background: #06c755; color: #fff; }
.cal-day.empty { background: transparent; border: none; cursor: default; }
.cal-day.today { border-color: #06c755; }
.selected-count { text-align: center; font-size: 14px; margin: 8px 0; }
.selected-dates { font-size: 13px; background: #fff; padding: 12px; margin: 8px 0; }
.submit-btn { width: 100%; padding: 16px; background: #06c755; color: #fff; border: none; border-radius: 8px; font-size: 16px; margin-top: 12px; }
.close-btn { width: 100%; padding: 12px; margin-top: 8px; }

.result { text-align: center; padding: 32px 16px; }
.loading { text-align: center; padding: 32px; }
</style>
</head>

<body>
<div class="container">
<h1>案件一括登録</h1>

<div class="info-bar">
<div class="label">取引先 / 案件種別</div>
<div class="value" id="projectInfo">読み込み中...</div>
</div>

<div id="calendarArea">
<button id="submitBtn" onclick="submitDates()">登録する</button>
<button class="close-btn" onclick="closePage()">閉じる</button>
</div>

<div id="resultArea" style="display:none;"></div>
</div>

<script>

// ★URL取得
var params = new URLSearchParams(location.search);
var shortName = params.get('shortName');
var projectName = params.get('projectName');
var price = params.get('price');
var gasUrl = params.get('gasUrl');

// ★LIFF初期化
var LIFF_ID = '2009635998-soccgFA4';
var liffReady = false;

async function initLiffSafely() {
  try {
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_, reject) => setTimeout(() => reject('timeout'), 8000))
    ]);
    liffReady = true;
    console.log("LIFF OK");
  } catch (e) {
    console.log("LIFF NG", e);
    liffReady = false;
  }
}

// ★onload置き換え
window.onload = async function () {
  await initLiffSafely();

  document.getElementById('projectInfo').textContent =
    shortName + ' / ' + projectName + '（' + price + '円）';
};

// ★ダミー登録処理
function submitDates() {
  document.getElementById('calendarArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';

  window.lastRegistration = {
    shortName, projectName, price,
    dates: "テスト日付",
    count: 1
  };

  document.getElementById('resultArea').innerHTML =
    '<button onclick="sendCompleteAndClose()">閉じる</button>';
}

// ★sendCompleteAndClose置き換え
async function sendCompleteAndClose() {

  var reg = window.lastRegistration;
  if (!reg) return;

  var messageText =
    '一括登録完了:' +
    reg.shortName + ':' +
    reg.projectName + ':' +
    reg.price + ':' +
    reg.dates + ':' +
    reg.count;

  // ★LIFF送信
  if (liffReady && liff.isInClient() && liff.isApiAvailable('sendMessages')) {
    try {
      await liff.sendMessages([{ type: 'text', text: messageText }]);
      closePage();
      return;
    } catch (e) {
      console.log("LIFF送信失敗", e);
    }
  }

  // ★フォールバック
  var lineUrl = 'https://line.me/R/oaMessage/@338iquzz/?' + encodeURIComponent(messageText);
  location.href = lineUrl;
}

// ★closePage置き換え
function closePage() {
  try {
    if (liff && liff.isInClient()) {
      liff.closeWindow();
      return;
    }
  } catch (e) {}

  window.close();

  document.getElementById('resultArea').innerHTML =
    '完了しました。LINEに戻ってください';
}

</script>
</body>
</html>
